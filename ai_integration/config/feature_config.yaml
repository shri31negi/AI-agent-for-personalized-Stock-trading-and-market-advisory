features:
  lag_features:
    enabled: true
    lags: [1, 2, 3, 5, 10, 20]
    
  rolling_features:
    enabled: true
    windows: [5, 10, 20, 50, 200]
    metrics: [mean, std, min, max]
    
  technical_indicators:
    rsi:
      enabled: true
      period: 14
    macd:
      enabled: true
      fast: 12
      slow: 26
      signal: 9
    moving_averages:
      enabled: true
      periods: [20, 50, 200]
    bollinger_bands:
      enabled: true
      period: 20
      std_dev: 2
    atr:
      enabled: true
      period: 14
    stochastic:
      enabled: true
      period: 14
      smooth_k: 3
      smooth_d: 3

preprocessing:
  missing_values: forward_fill
  normalization: minmax
  outlier_removal: iqr
  outlier_threshold: 1.5

profiling:
  risk_weights:
    trading_frequency: 0.15
    position_size: 0.20
    leverage: 0.15
    asset_diversity: 0.15
    volatility_preference: 0.20
    loss_tolerance: 0.15
    
  stability_weights:
    consistency: 0.25
    turnover: 0.25
    holding_period: 0.25
    win_rate: 0.25
    
  discipline_weights:
    stop_loss: 0.30
    take_profit: 0.15
    emotional_control: 0.30
    plan_adherence: 0.25
