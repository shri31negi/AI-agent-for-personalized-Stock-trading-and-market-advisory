models:
  lstm:
    sequence_length: 60
    epochs: 50
    batch_size: 32
    layers:
      - type: LSTM
        units: 50
        return_sequences: true
      - type: Dropout
        rate: 0.2
      - type: LSTM
        units: 50
      - type: Dropout
        rate: 0.2
      - type: Dense
        units: 25
      - type: Dense
        units: 1
    optimizer: adam
    loss: mse
    
  arima:
    order: [5, 1, 0]
    seasonal_order: [0, 0, 0, 0]
    
  prophet:
    changepoint_prior_scale: 0.05
    seasonality_prior_scale: 10
    seasonality_mode: multiplicative
    daily_seasonality: false
    weekly_seasonality: true
    yearly_seasonality: true

training:
  validation_split: 0.2
  test_split: 0.1
  random_seed: 42

paths:
  models_dir: trained_models
  data_dir: data
  logs_dir: logs
